spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/skillhub
    username: skillhub
    password: skillhub_dev
  data:
    redis:
      host: localhost
      port: 6379
  session:
    store-type: redis
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID:local-placeholder}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET:local-placeholder}

skillhub:
  search:
    semantic:
      enabled: true
      weight: 0.35
      candidate-multiplier: 8
      max-candidates: 120
  auth:
    mock:
      enabled: true
  embedding:
    model: ${EMBEDDING_MODEL:minimax}
    minimax:
      api-key: ${MINIMAX_API_KEY:}
      base-url: ${MINIMAX_API_BASE_URL:https://api.minimaxi.com/v1}
      model: emb-0
      dimensions: 1024
    local:
      model-path: ${LOCAL_EMBEDDING_MODEL_PATH:}
      batch-size: 32
  notification:
    cleanup:
      read-retention-days: 30
      unread-retention-days: 90
  security:
    scanner:
      enabled: ${SKILLHUB_SECURITY_SCANNER_ENABLED:false}
    stream:
      reclaim-enabled: ${SKILLHUB_SCAN_STREAM_RECLAIM_ENABLED:true}
      reclaim-min-idle: ${SKILLHUB_SCAN_STREAM_RECLAIM_MIN_IDLE:PT2M}
      reclaim-batch-size: ${SKILLHUB_SCAN_STREAM_RECLAIM_BATCH_SIZE:20}
      reclaim-interval: ${SKILLHUB_SCAN_STREAM_RECLAIM_INTERVAL:PT30S}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
  profile:
    moderation:
      machine-review: ${SKILLHUB_PROFILE_MACHINE_REVIEW_ENABLED:true}
      human-review: ${SKILLHUB_PROFILE_HUMAN_REVIEW_ENABLED:true}

logging:
  level:
    com.iflytek.skillhub: INFO
    org.springframework.security: WARN
